name: Deploy on GCP

on:
  push:
    branches: [ master ] # Se déclenche lors d'un push sur la branche main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/blockchaincacao

            git fetch origin master
            git reset --hard origin/master

            cd api
            npm install
            cd ../chaincode
            npm install
            cd ..

            sudo docker compose down
            sudo docker compose up -d --build

            bash ./deploy-chaincode.sh

            sudo cp ./infra/docker_patches/index.cjs.js /var/www/blockchaincacao/microfab-data/peer-org1/data/externalbuilder/builds/cacao-contract_1.0-b6ac3b9d466a29ad379c5556ccdbd6643b6e7c0f89e6f39b06e282cd9fe3db39/bld/node_modules/@so-ric/colorspace/dist/index.cjs.js
            # pm2 reload hyperledger-api